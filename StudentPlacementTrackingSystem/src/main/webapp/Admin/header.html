<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Placement Dashboard</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">

<link
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
	rel="stylesheet">

</head>

<body class="bg-light">

	<div class="d-flex">

		<!-- Sidebar -->

		<div class="bg-dark text-white p-3 vh-100" style="width: 250px;">

			<h4 class="text-center mb-4">
				<i class="fa-solid fa-graduation-cap"></i> Placement Tracker
			</h4>

			<!-- Dashboard -->

			<a href="#" class="btn btn-dark w-100 text-start mb-2 border"> <i
				class="fa-solid fa-house me-2"></i> Dashboard
			</a>

			<!-- Students -->

			<button class="btn btn-dark w-100 text-start mb-2 border"
				data-bs-toggle="collapse" data-bs-target="#studentMenu">

				<i class="fa-solid fa-users me-2"></i> Students <i
					class="fa-solid fa-angle-down float-end mt-1"></i>

			</button>

			<div class="collapse" id="studentMenu">

				<div class="card card-body">

					<a href="addStudent" class="text-decoration-none mb-2"> Add Student </a> <a
						href="#" class="text-decoration-none mb-2"> View Students </a> <a
						href="#" class="text-decoration-none"> Placed Students </a>

				</div>

			</div>

			<!-- Companies -->

			<button class="btn btn-dark w-100 text-start mb-2 border"
				data-bs-toggle="collapse" data-bs-target="#companyMenu">

				<i class="fa-solid fa-building me-2"></i> Companies <i
					class="fa-solid fa-angle-down float-end mt-1"></i>

			</button>

			<div class="collapse" id="companyMenu">

				<div class="card card-body">

					<a href="#" class="text-decoration-none mb-2"> Add Company </a> <a
						href="#" class="text-decoration-none"> Manage Companies </a>

				</div>

			</div>

			<!-- Placements -->

			<button class="btn btn-dark w-100 text-start mb-2 border"
				data-bs-toggle="collapse" data-bs-target="#placementMenu">

				<i class="fa-solid fa-briefcase me-2"></i> Placements <i
					class="fa-solid fa-angle-down float-end mt-1"></i>

			</button>

			<div class="collapse" id="placementMenu">

				<div class="card card-body">

					<a href="#" class="text-decoration-none mb-2"> New Drive </a> <a
						href="#" class="text-decoration-none"> Drive Results </a>

				</div>

			</div>

			<!-- Reports -->

			<a href="#" class="btn btn-dark w-100 text-start mb-2 border"> <i
				class="fa-solid fa-chart-line me-2"></i> Reports
			</a>

			<!-- Logout -->

			<a href="#" class="btn btn-danger w-100 text-start mt-4"> <i
				class="fa-solid fa-right-from-bracket me-2"></i> Logout
			</a>

		</div>

		<!-- Main Content -->

		<div class="container-fluid p-4">

			<!-- Top Navbar -->

			<div
				class="bg-white shadow-sm rounded p-3 mb-4 d-flex justify-content-between align-items-center">

				<h3>Admin Dashboard</h3>

				<div class="dropdown">

					<button class="btn btn-dark dropdown-toggle"
						data-bs-toggle="dropdown">

						<i class="fa-solid fa-user"></i> Admin
					</button>

					<ul class="dropdown-menu dropdown-menu-end">

						<li><a class="dropdown-item" href="#"> Profile </a></li>

						<li><a class="dropdown-item" href="#"> Settings </a></li>

						<li>
							<hr class="dropdown-divider">
						</li>

						<li><a class="dropdown-item text-danger" href="#"> Logout
						</a></li>

					</ul>

				</div>

			</div>



			<div class="card shadow border-0 mt-5">
